<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KMinds | Sign Up</title>
  <link rel='stylesheet' href='assets/css/main.css'>
</head>
<body>
  <header>
    <h1>Join KMinds</h1>
    <nav aria-label="Auth navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="signup.html" aria-current="page">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section aria-labelledby="signup-heading">
      <h2 id="signup-heading">Member Registration</h2>
      <p>Please use your KUET student email. Only emails ending in @stud.kuet.ac.bd are valid.</p>

      <form action="#" method="post">
        <div>
          <label for="full-name">Full Name</label>
          <input id="full-name" name="name" type="text" required>
        </div>

        <div>
          <label for="email">Email (@stud.kuet.ac.bd)</label>
          <input id="email" name="email" type="email" placeholder="yourid@stud.kuet.ac.bd" pattern="^[^@\s]+@stud\.kuet\.ac\.bd$" required>
        </div>

        <div>
          <label for="roll">Roll</label>
          <input id="roll" name="roll" type="text" required>
        </div>

        <div>
          <label for="department">Department</label>
          <select id="department" name="department" required>
            <option value="" selected disabled>Select Department</option>
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="MSE">MSE</option>
            <option value="CE">CE</option>
            <option value="ME">ME</option>
            <option value="URP">URP</option>
            <option value="BTE">BTE</option>
            <option value="IPE">IPE</option>
            <option value="LE">LE</option>
            <option value="ECE">ECE</option>
          </select>
        </div>

        <div>
          <label for="year-term">Current Year-Term</label>
          <select id="year-term" name="year_term" required>
            <option value="" selected disabled>Select Year-Term</option>
            <option value="1-1">1-1</option>
            <option value="1-2">1-2</option>
            <option value="2-1">2-1</option>
            <option value="2-2">2-2</option>
            <option value="3-1">3-1</option>
            <option value="3-2">3-2</option>
            <option value="4-1">4-1</option>
            <option value="4-2">4-2</option>
          </select>
        </div>

        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" minlength="8" required>
        </div>

        <div>
          <label for="confirm-password">Confirm Password</label>
          <input id="confirm-password" name="confirm_password" type="password" minlength="8" required>
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </section>
  </main>

  <footer>
    <p>KMinds, KUET</p>
  </footer>
</body>
</html>
